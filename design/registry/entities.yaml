    notes: "抵押率【数据质量】警告阈值。MortgageValue > floor(PurchasePrice × 此值) 触发结构化警告 MortgageRateHigh(board-data Edge Cases / AC-24c)。
      0.6 是抵押率越出经典规则区(经典约 0.5)的保守警戒线——警告的是【board 数据异常】，非套利。
