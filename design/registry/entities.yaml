# Game World Entity Registry
#
# PURPOSE: Single source of truth for all named game-world facts that appear
# in more than one document. Skills check this before writing new content to
# detect cross-doc inconsistencies at authoring time.
#
# RULES:
#   - Only register facts that cross system boundaries. Internal-only facts
#     (a formula used in one GDD only) do NOT need to be registered.
#   - Never delete entries — set status: deprecated instead.
#   - status values: active | deprecated | placeholder.
#     placeholder = value is a temp-fill (e.g. public reference number) pending
#     derivation by the owning system. Downstream systems MUST NOT hardcode a
#     placeholder value into logic — read it from the owning system's runtime
#     field/interface instead. The owning system flips status to active and
#     updates value (set revised:) once the real value is derived.
#   - When a value changes: update the value, set revised: to today's date,
#     and add a comment with the old value and which GDD changed it.
#   - source: is the authoritative GDD — the one that "owns" this fact.
#     Other GDDs that reference it list themselves in referenced_by.
#   - When a new GDD references an existing entry, append its path to
#     referenced_by. Do not create a duplicate entry.
#
# WRITTEN BY: /design-system (Phase 5 — after GDD sections are approved)
#             /consistency-check (when resolving conflicts)
# READ BY:    /design-system (Phase 2 — before authoring begins, and after
#               Section C/D writes to conflict-check new entities/formulas)
#             /consistency-check (primary input — grep-first, GDD-second)
#             /review-all-gdds (Phase 1 — baseline for Phase 2 checks)
#             /architecture-review (data structure and interface validation)
#
# SEARCH PATTERNS (for skills using Grep):
#   All entity names:        Grep pattern="^  - name:" path="design/registry/entities.yaml"
#   Specific entity:         Grep pattern="  - name: goblin" path="design/registry/entities.yaml"
#   All items:               Grep pattern="^  - name:" path="design/registry/entities.yaml" (items section)
#   What combat.md owns:     Grep pattern="source: design/gdd/combat.md"
#   What inventory.md uses:  Grep pattern="referenced_by.*inventory"
#   All gold values:          Grep pattern="value_gold:"
#   Deprecated entries:      Grep pattern="status: deprecated"
#
# FORMAT: YAML. Consistent indentation is critical for grep reliability.
#   Sections: entities | items | formulas | constants
#   Each entry: name, status, source, referenced_by[], attributes{}, added, revised

version: 1
last_updated: 2026-06-02

# ─── ENTITIES ────────────────────────────────────────────────────────────────
# Named game-world objects: enemies, NPCs, characters, factions, bosses.
# Register an entity here when it appears in more than one GDD — e.g., an
# enemy defined in combat.md that also drops items listed in inventory.md.
#
# Required fields: name, status, source, referenced_by, added
# Attribute fields: any key stats that could appear in another GDD
#   (health, damage, drops, faction, etc.)

entities: []

# Example (remove when first real entry is added):
#
# entities:
#   - name: goblin
#     status: active              # active | deprecated
#     source: design/gdd/combat.md
#     referenced_by:
#       - design/gdd/combat.md
#       - design/gdd/inventory.md
#     health: 40
#     damage: 8
#     drops:
#       - item: goblin_arm        # must match an entry in items section
#         qty: 1
#         drop_rate: 0.8          # 0.0–1.0
#     added: 2026-03-26
#     revised: ""


# ─── ITEMS ───────────────────────────────────────────────────────────────────
# Named collectables, equipment, consumables, crafting materials, currency.
# Register an item when its name or value appears in more than one GDD.
#
# Required fields: name, status, source, referenced_by, added
# Attribute fields: value_gold, weight, stackable, category, and any stat
#   modifiers that another system (e.g., economy, crafting) might reference.

items: []

# Example:
#
# items:
#   - name: goblin_arm
#     status: active
#     source: design/gdd/combat.md   # drop defined in combat GDD
#     referenced_by:
#       - design/gdd/combat.md
#       - design/gdd/inventory.md    # inventory GDD lists its weight/stack rules
#       - design/gdd/economy.md      # economy GDD references its sell price
#     value_gold: 5
#     weight: 1
#     stackable: true
#     category: crafting_material
#     added: 2026-03-26
#     revised: ""


# ─── FORMULAS ────────────────────────────────────────────────────────────────
# Named calculations with defined variables and output ranges.
# Register a formula when its output feeds into another system's input,
# or when another GDD references it by name.
#
# Required fields: name, status, source, referenced_by, variables[],
#   output_range[min, max], added
# Optional: expression (the actual formula), notes

formulas:
  - name: advance_index
    status: active
    source: design/gdd/board-data.md
    referenced_by:
      - design/gdd/board-data.md
      - design/gdd/movement.md   # R-move 2026-06-02：移动(4)消费 AdvanceIndex 落点+passedGo
      # 预期消费方（GDD 成形后追加）：经济现金(5)
    variables:
      - from
      - steps
      - N
    output_range: [0, 39]   # 0 .. N-1，经典盘 N=40
    expression: "mod(from + steps, N)"
    notes: "环路位移。mod 为数学取余（结果恒≥0，非 C++ 对负数的 %）。steps 可负（后退牌）、可超 N（多圈）。落点恒在 [0,N-1]。"
    added: 2026-06-01
    revised: ""
  - name: passed_go_count
    status: active
    source: design/gdd/board-data.md
    referenced_by:
      - design/gdd/board-data.md
      - design/gdd/movement.md   # R-move 2026-06-02：移动(4)取 passedGo 作发薪 push 门(P-1)
      # 预期消费方：经济现金(5) —— 据此发"经过 GO 薪水"
    variables:
      - from
      - steps
      - N
    output_range: [-1, 2]   # 正常单次掷骰/事件区间；理论无界
    expression: "floor((from + steps) / N) - floor(from / N)"
    notes: "经过出发格 GO 的净次数。floor 为向负无穷地板除。正=顺时针经过，负=逆向穿越。
      R2 决策：恒用上方通用式（减去 floor(from/N) 项）。简化式 floor((from+steps)/N) 仅在 from∈[0,N-1] 时成立；
      通用式对 from 越界亦数学正确（鲁棒自修正），消除 Shipping 构建下 ensure() 失效时的静默错值。
      契约：如实输出有符号值，发薪策略由经济系统裁决（passed_go≤0 不发薪）。"
    added: 2026-06-01
    revised: 2026-06-01    # R3 同步 GDD F-2 通用式决策（原简化式 floor((from+steps)/N) 仅 from∈[0,N-1] 成立）
  - name: steps_between
    status: active
    source: design/gdd/board-data.md
    referenced_by:
      - design/gdd/board-data.md
      - design/gdd/movement.md   # R-move 2026-06-02：移动(4) TeleportTo(paysGo=true) 用 steps_between 算前向步数
      # 预期消费方：AI(10)、策略卡/机会牌(15/7)"前进到最近X"
    variables:
      - from
      - target
      - N
    output_range: [0, 39]   # 0 .. N-1
    expression: "mod(target - from, N)"
    notes: "环上顺时针前向距离。供'前进到最近车站/公用'类牌与 AI 距离估值使用。同格=0。"
    added: 2026-06-01
    revised: ""
  - name: next_active_player
    status: active
    source: design/gdd/player-turn.md
    referenced_by:
      - design/gdd/player-turn.md
      # 预期消费方：破产胜负(9)
    variables:
      - cur
      - cur_safe
      - P
      - A
    output_range: [0, 7]   # 0..P-1（P≤8）；|A|≤1 返回哨兵 INDEX_NONE(-1)
    expression: "cur_safe = ((cur % P) + P) % P; candidate_k = mod(cur_safe + k, P); next = candidate_k where k = min{ k in [1,P-1] | candidate_k in A }"
    notes: "下一个未破产玩家的 TurnOrderIndex。A=未破产玩家 TurnOrderIndex 集合。
      【R1 守卫先行】|A|≤1 在枚举【之前】返回 INDEX_NONE(|A|=1 即胜者已定,不返回该唯一存活者,CR-6 应已触发);
      仅 |A|≥2 进入枚举。消除旧版'|A|=1 且存活者≠cur 时枚举返回有效 index'与声明的矛盾。
      mod 安全(R5 主公式权威化):入口先把 cur 规范化为 cur_safe=((cur%P)+P)%P(欧几里得取模),消除损坏入参(cur<0/cur≥P,如读档异常)产生负/越界 candidate 的来源;枚举用 cur_safe。
      旧'cur+k 恒为正不需负数防御'论证已废(在 |A|=P 且 cur=-P 时失效)。与 board-data advance_index 仅共享'环形索引模式',作用于玩家环 P。防死循环:|A|≥2 时 k 遍历 1..P-1 必终止(前提 cur_safe∈[0,P-1])。"
    added: 2026-06-01
    revised: 2026-06-01    # R8 同步 GDD R5 主公式权威化（旧 mod(cur+k,P) → mod(cur_safe+k,P)，入口欧几里得取模规范化；registry 此前漂移未同步）
  - name: active_player_count
    status: active
    source: design/gdd/player-turn.md
    referenced_by:
      - design/gdd/player-turn.md
      - design/gdd/bankruptcy.md   # 破产胜负(9) CR-6/F-2 —— APC==1 触发胜负，return-only 计算
    variables:
      - players
    output_range: [0, 8]   # 0..P
    expression: "APC = count(p in players where p.bIsBankrupt == false)"
    notes: "未破产玩家数。APC==1 触发 CR-6 胜负信号；APC==0 为正常流程不可达异常态(assert)。A 集合与 APC 须取自同一快照。
      【接缝注 2026-06-04】此表达式为 player-turn(2) F-2 口径——在 TurnEnd 阶段、bIsBankrupt 已写之后计算，故 count(bIsBankrupt==false) 已自然排除破产者。
      破产(9) F-2 在 ResolveBankruptcy 内计算 APC，时点在 return-only 尚未写 bIsBankrupt 之前，须显式 `p != debtor`：APC = count(p in snapshot where p != debtor ∧ p.bIsBankrupt==false)。
      两式同值不同时点，实现勿照搬本表达式进系统9（否则 debtor 被当活跃 → APC 偏高1 → 胜负不在正确 tick 触发，S2 级）。见 bankruptcy F-2 ⚠。"
    added: 2026-06-01
    revised: ""
  - name: doubles_to_jail
    status: active
    source: design/gdd/player-turn.md
    referenced_by:
      - design/gdd/player-turn.md
      # 预期消费方：事件格/监狱(7)、设置&House Rules(23)
    variables:
      - ConsecutiveDoubles
      - DOUBLES_JAIL_THRESHOLD
    output_range: [0, 1]   # bool
    expression: "bShouldJail = (ConsecutiveDoubles >= DOUBLES_JAIL_THRESHOLD)"
    notes: "连续双点入狱判定。阈值见常量 doubles_jail_threshold(默认3)。用 >= 防御异常越级。时序：骰子报 bIsDouble→本系统先累加 ConsecutiveDoubles→再判定。"
    added: 2026-06-01
    revised: ""
  - name: turn_order_init_rank
    status: active
    source: design/gdd/player-turn.md
    referenced_by:
      - design/gdd/player-turn.md
    variables:
      - roll_i
      - round
    output_range: [0, 7]   # 0..P-1，构成完全排列
    expression: "rank(i) = position of i in sort({(roll_i,i)}, key=roll_i desc); ties re-roll until MAX_TIEBREAK_ROUNDS then seat-index ascending"
    notes: "开局掷骰定序排名(0=最高=先手)。roll 数值归骰子(3)，排序逻辑归本系统。平手达 max_tiebreak_rounds 后按席位升序裁定(确定性、防死循环)。"
    added: 2026-06-01
    revised: ""
  - name: dice_roll
    status: active
    source: design/gdd/dice.md
    referenced_by:
      - design/gdd/dice.md
      # 预期消费方：玩家回合(2)消费 Total/bIsDouble、移动(4)消费 Total、事件格(7)消费 bIsDouble
    variables:
      - Die1
      - Die2
      - Total
      - bIsDouble
    output_range: [2, 12]   # Total ∈ [2,12]；bIsDouble 为派生 bool
    expression: "Die1 = FRandomStream.RandRange(1,6); Die2 = FRandomStream.RandRange(1,6); Total = Die1 + Die2; bIsDouble = (Die1 == Die2)"
    notes: "标准双骰(2d6)。两颗独立均匀 d6(各面 1/6)、非'先掷 Total 再拆解'。Total 三角分布(P(7)=6/36 峰、P(2)=P(12)=1/36)；P(bIsDouble)=6/36=1/6。
      走单一权威 FRandomStream(可种子化、F-4 性质 D 确定性重放)。payload FDiceRollResult{Die1,Die2,Total,bIsDouble} 不变式：Total==Die1+Die2 且 bIsDouble==(Die1==Die2)。
      契约：本系统只产出不解释——走几步归移动(4)、双点链/入狱归回合(2)、定序只取 Total 忽略 bIsDouble 归回合(2)。注册供 /consistency-check 防移动/回合假设不同骰制。"
    added: 2026-06-01
    revised: ""
  - name: salary
    status: active
    source: design/gdd/economy-cash.md
    referenced_by:
      - design/gdd/economy-cash.md
      - design/gdd/movement.md   # R-move 2026-06-02：移动(4) push (passedGo,SalaryAmount) 触发发薪
      # 输入方：棋盘(1) SalaryAmount；HUD(16) 显示
    variables:
      - passed_go
      - SalaryAmount
    output_range: [0, 2400]   # 正常 passed_go∈[0,2]×200；异常溢出输入 clamp 到 1000×SalaryAmount；dev ensure passed_go≤12
    expression: "salary = clamp(max(passed_go,0), 0, PASSED_GO_SAFE_MAX=1000) × SalaryAmount"
    notes: "发薪(经济 F-1)。gate 在 passed_go>0(非 salary>0)；passed_go≤0 不发。SalaryAmount 物理存棋盘 Go 格、真值=go_salary_amount(200)。
      【R1 溢出硬防护】乘法前运行时 clamp passed_go 到 [0,1000](非仅 dev ensure，防 Shipping 下异常 passed_go × SalaryAmount int32 溢出为负击穿 Cash≥0)；Credit/Debit 另守 amount≥0。
      防双重发薪:SpecialAction=CollectSalary 仅 UI 标记不触发第二次。注册供 /consistency-check 防移动/事件假设不同发薪触发。"
    added: 2026-06-02
    revised: ""
  - name: property_rent
    status: active
    source: design/gdd/economy-cash.md
    referenced_by:
      - design/gdd/economy-cash.md
      - design/gdd/building-upgrade.md   # 建房(8) 供 house_count(F-2 输入)
      # 输入方：所有权(6) 供 is_monopoly/is_mortgaged + 建房(8) 供 house_count（6 不持，防 6↔8 环；经回合2 ResolvePhase 聚合）+ 棋盘(1) RentTable；AI(10)/HUD(16) 引用
    variables:
      - is_mortgaged
      - is_monopoly
      - house_count
      - RentTable
      - monopoly_rent_multiplier
    output_range: [0, 2000]   # ≥0；上限取决于 RentTable 真值（占位体系内）
    expression: "if is_mortgaged: 0; elif (is_monopoly and house_count==0): RentTable[0]×monopoly_rent_multiplier; else: RentTable[clamp(house_count,0,5)]"
    notes: "地产租金(经济 F-2,piecewise)。垄断×2 只作用无房 RentTable[0],酒店绝不翻倍。is_mortgaged 短路置 0 先于表查找。
      house_count clamp[0,5] 防越界。归属事实(is_monopoly/is_mortgaged)由所有权(6)、house_count 由建房(8) 经回合2 ResolvePhase 聚合后 push 传入。注册供 /consistency-check 防下游误用翻倍规则。"
    added: 2026-06-02
    revised: ""
  - name: railroad_rent
    status: active
    source: design/gdd/economy-cash.md
    referenced_by:
      - design/gdd/economy-cash.md
      # 输入方：所有权(6) 供 station_count + 棋盘(1) RentTable[4]
    variables:
      - station_count
      - RentTable
    output_range: [0, 999]   # ≥0；档位值取决于 RentTable 真值
    expression: "station_count>=1 ? RentTable[clamp(station_count-1,0,3)] : 0"
    notes: "车站租金(经济 F-3)。守 station_count≥1 否则 0（防 RentTable[-1] 崩，不假设所有权6恒正确）。"
    added: 2026-06-02
    revised: ""
  - name: utility_rent
    status: active
    source: design/gdd/economy-cash.md
    referenced_by:
      - design/gdd/economy-cash.md
      # 输入方：所有权(6) 供 utility_count + 棋盘(1) DiceMultiplierTable + 骰子(3)/移动(4)/事件(7) 供 dice_total
    variables:
      - dice_total
      - utility_count
      - DiceMultiplierTable
    output_range: [0, 120]   # 12×10 上限（DiceMultiplierTable 占位 [4,10]）
    expression: "utility_count>=1 ? dice_total × DiceMultiplierTable[clamp(utility_count-1,0,1)] : 0"
    notes: "公用租金(经济 F-4)。dice_total∈[2,12] 显式参数传入（不读缓存：正常=移动骰，前进到最近公用=事件额外骰）。守 utility_count≥1。"
    added: 2026-06-02
    revised: ""
  - name: is_monopoly
    status: active
    source: design/gdd/property-ownership.md
    referenced_by:
      - design/gdd/economy-cash.md      # property_rent F-2 消费(垄断×2 只作用无房 base)
      # 输入方：棋盘(1) GetTilesInGroup + 本系统 owner map；AI(10) 估值引用
    variables:
      - playerId
      - colorGroup
      - owner_map
    output_range: [false, true]   # bool
    expression: "playerId!=INDEX_NONE AND colorGroup!=None AND |GetTilesInGroup(colorGroup)|>0 AND (∀ t∈group: owner_map[t]==playerId)"
    notes: "垄断判定(地产所有权6 F-1)。抵押不破坏垄断归属(完整组未抵押无房地享×2,经典忠实,Rento 核查 OQ-Prop-5)。空组/None/INDEX_NONE→false(空集守门防 vacuous-true)。注册供 /consistency-check 防下游误判垄断破坏规则。"
    added: 2026-06-03
    revised: ""
  - name: station_count
    status: active
    source: design/gdd/property-ownership.md
    referenced_by:
      - design/gdd/economy-cash.md      # railroad_rent F-3 消费(守 count≥1)
      # 输入方：棋盘(1) GetTileData.TileType + 本系统 owner map；AI(10) 引用
    variables:
      - playerId
      - owner_map
    output_range: [0, 4]   # 经典 4 车站；自定义棋盘 [0,N-1]
    expression: "playerId==INDEX_NONE ? 0 : count{t | TileType(t)==Railroad AND owner_map[t]==playerId}"
    notes: "车站持有计数(地产所有权6 F-2)。无主格(INDEX_NONE)经严格等值比较自然排除,不溢出(count≤N-1)。本系统须保证不低报(经济守门只防 0 不崩,见 OQ-T-Prop-1)。"
    added: 2026-06-03
    revised: ""
  - name: utility_count
    status: active
    source: design/gdd/property-ownership.md
    referenced_by:
      - design/gdd/economy-cash.md      # utility_rent F-4 消费(守 count≥1)
      # 输入方：棋盘(1) GetTileData.TileType + 本系统 owner map；AI(10) 引用
    variables:
      - playerId
      - owner_map
    output_range: [0, 2]   # 经典 2 公用；自定义 [0,N-1]
    expression: "playerId==INDEX_NONE ? 0 : count{t | TileType(t)==Utility AND owner_map[t]==playerId}"
    notes: "公用持有计数(地产所有权6 F-3)。同 station_count 排除无主格、不低报。"
    added: 2026-06-03
    revised: ""
  - name: unmortgage_cost
    status: active
    source: design/gdd/economy-cash.md
    referenced_by:
      - design/gdd/economy-cash.md
      # 输入方：棋盘(1) MortgageValue；下游 AI(10) 估值
    variables:
      - MortgageValue
      - fee_num
      - fee_den
    output_range: [2, 4400]   # >MortgageValue；上限取决于 MortgageValue 真值
    expression: "fee = (MortgageValue×fee_num + fee_den-1)/fee_den; unmortgage_cost = MortgageValue + fee   // 整数 ceil"
    notes: "赎回(经济 F-6)。整数 ceil 杀 float（联网重放跨平台/跨编译配置位级一致）。fee_num/fee_den=1/10(unmortgage_fee_rate)。
      fee 恒≥1（堵 1×1.1→1 免费赎回退化）。MV=75→83、MV=1→2。"
    added: 2026-06-02
    revised: ""
  - name: building_sellback
    status: active
    source: design/gdd/economy-cash.md
    referenced_by:
      - design/gdd/economy-cash.md
      - design/gdd/building-upgrade.md   # 建房(8) 供建筑清单(GetPlayerBuildings 枚举,F-6)
      # 输入方：棋盘(1) BuildingCost；建房(8) 供建筑清单；net_liquidation_value 消费
    variables:
      - BuildingCost
      - sell_num
      - sell_den
    output_range: [0, 1000]   # ≥0；取决于 BuildingCost 真值
