    notes: "卖房返还(经济 F-8)。整数 floor。sell_num/sell_den=1/2(building_sellback_ratio)。比率归经济、建筑清单归建房(8)。BuildingCost=75→37。"
    added: 2026-06-02
    revised: ""
  - name: house_count
